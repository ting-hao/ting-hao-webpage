<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2a44"/>
    </marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a869a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="520" height="380" fill="#ffffff"/>

  <!-- z_{i-1} axis -->
  <line x1="90" y1="340" x2="90" y2="35" stroke="#1f2a44" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="100" y="35" font-style="italic" font-size="19" fill="#1f2a44">z<tspan font-size="13" baseline-shift="sub">i-1</tspan></text>

  <!-- z_i axis (tilted to show alpha_i twist) -->
  <line x1="300" y1="230" x2="372" y2="42" stroke="#1f2a44" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="378" y="42" font-style="italic" font-size="19" fill="#1f2a44">z<tspan font-size="13" baseline-shift="sub">i</tspan></text>

  <!-- dashed reference parallel to z_{i-1}, used to show alpha_i -->
  <line x1="300" y1="230" x2="300" y2="70" stroke="#7a869a" stroke-width="1.4" stroke-dasharray="5,4"/>

  <!-- common normal: x_i axis, length a_i -->
  <line x1="90" y1="230" x2="345" y2="230" stroke="#1f2a44" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="350" y="226" font-style="italic" font-size="19" fill="#1f2a44">x<tspan font-size="13" baseline-shift="sub">i</tspan></text>

  <!-- dimension line for a_i along the common normal -->
  <line x1="90" y1="252" x2="300" y2="252" stroke="#5b6a8a" stroke-width="1" marker-start="url(#arrowLight)" marker-end="url(#arrowLight)"/>
  <text x="180" y="270" font-style="italic" font-size="17" fill="#3a4666" text-anchor="middle">a<tspan font-size="12" baseline-shift="sub">i</tspan></text>

  <!-- dimension line for d_i along z_{i-1} between O_{i-1} and the common-normal foot -->
  <line x1="64" y1="110" x2="64" y2="230" stroke="#5b6a8a" stroke-width="1" marker-start="url(#arrowLight)" marker-end="url(#arrowLight)"/>
  <text x="48" y="174" font-style="italic" font-size="17" fill="#3a4666" text-anchor="middle">d<tspan font-size="12" baseline-shift="sub">i</tspan></text>

  <!-- dashed reference for x_{i-1} direction (previous common normal) at O_{i-1} -->
  <line x1="90" y1="110" x2="270" y2="110" stroke="#7a869a" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="90" y1="110" x2="245" y2="62" stroke="#1f2a44" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="250" y="58" font-style="italic" font-size="16" fill="#1f2a44">x<tspan font-size="11" baseline-shift="sub">i-1</tspan></text>

  <!-- theta_i arc at O_{i-1}, between dashed reference and x_{i-1} -->
  <path d="M 150 110 A 60 60 0 0 0 147 92" fill="none" stroke="#b3543d" stroke-width="1.6"/>
  <text x="160" y="92" font-style="italic" font-size="15" fill="#b3543d">&#952;<tspan font-size="11" baseline-shift="sub">i</tspan></text>

  <!-- alpha_i arc at common-normal/z_i junction, between dashed vertical and z_i -->
  <path d="M 300 195 A 35 35 0 0 0 322 173" fill="none" stroke="#b3543d" stroke-width="1.6"/>
  <text x="318" y="195" font-style="italic" font-size="15" fill="#b3543d">&#945;<tspan font-size="11" baseline-shift="sub">i</tspan></text>

  <!-- joint / frame origin points -->
  <circle cx="90" cy="110" r="3.5" fill="#1f2a44"/>
  <text x="98" y="123" font-size="13" fill="#1f2a44">O<tspan font-size="9" baseline-shift="sub">i-1</tspan></text>

  <circle cx="90" cy="230" r="3.5" fill="#1f2a44"/>

  <circle cx="300" cy="230" r="3.5" fill="#1f2a44"/>
  <text x="306" y="247" font-size="13" fill="#1f2a44">O<tspan font-size="9" baseline-shift="sub">i</tspan></text>

  <!-- link i-1 (rod) -->
  <line x1="90" y1="340" x2="90" y2="230" stroke="#9aa3b5" stroke-width="6" stroke-linecap="round" opacity="0.45"/>

  <!-- baseline ground hatching for a sense of fixed reference -->
  <line x1="40" y1="345" x2="140" y2="345" stroke="#c9cfdb" stroke-width="1.5"/>
</svg>
